name: Update Repo Index

on:
  workflow_dispatch:

jobs:
  update-index:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg
        run: brew install dpkg

      - name: Generate package index
        shell: bash
        run: |
          set -euo pipefail

          SCAN_DIR="./debs"
          OUTPUT="Packages"

          [[ -d "$SCAN_DIR" ]] || { echo "debs directory not found"; exit 1; }
          ls "$SCAN_DIR"/*.deb >/dev/null 2>&1 || { echo "No .deb files found in $SCAN_DIR"; exit 1; }
          command -v dpkg-scanpackages >/dev/null || { echo "dpkg-scanpackages not found"; exit 1; }

          dpkg-scanpackages -m "$SCAN_DIR" /dev/null > "$OUTPUT" 2>/dev/null
          sed -i '' 's/^Architecture: iphoneos-arm$/Architecture: iphoneos-arm64/' "$OUTPUT"
          gzip -9fk "$OUTPUT"
          bzip2 -9fk "$OUTPUT"

          echo "Packages, Packages.gz, Packages.bz2 已全量覆盖更新"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git reset
          git add Packages Packages.gz Packages.bz2
          git commit --allow-empty -m "Update package index"
          git push origin HEAD
