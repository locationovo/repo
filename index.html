<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #f8f8f8;
    color: #333;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    line-height: 1.8;
    display: flex;
  }

  /* 侧边栏 */
  aside {
    width: 180px;
    background: #fff;
    border-right: 1px solid #eee;
    padding: 30px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  aside a {
    display: block;
    color: #666;
    font-size: 13px;
    text-decoration: none;
    padding: 6px 0;
  }
  aside a:hover { color: #000; }

  /* 主体 */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .box {
    text-align: center;
    max-width: 380px;
  }

  /* 图标装饰位 */
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 16px;
    background: #eee;
    /* background: url(icon.png) center/cover; */
  }

  .box h1 { font-size: 24px; font-weight: 700; color: #111; }
  .box .tag { color: #999; font-size: 13px; margin: 2px 0 30px; }

  .btn {
    display: block;
    width: 100%;
    padding: 12px 0;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #333;
    font-size: 15px;
    text-decoration: none;
  }
  .btn:hover { border-color: #aaa; background: #fafafa; }

  .footer { font-size: 12px; color: #bbb; margin-top: 30px; }

  @media (max-width: 600px) {
    body { flex-direction: column; }
    aside {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid #eee;
      padding: 14px 20px;
      flex-direction: row;
      gap: 18px;
    }
    main { padding: 30px 20px; }
  }
</style>
</head>
<body>

  <aside>
    <a href="https://github.com/locationovo" target="_blank">我的主页</a>
    <a href="https://github.com/locationovo/repo" target="_blank">仓库地址</a>
  </aside>

  <main>
    <div class="box">
      <!-- 图标以后再说 -->
      <div class="icon" style="background: url(icon.png) center/cover no-repeat;"></div>

      <h1>添加插件源</h1>
      <p class="tag">locationovo个人插件源</p>

      <a class="btn" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://locationovo.github.io/repo">
        添加到Cydia
      </a>
      <a class="btn" href="sileo://source/https://locationovo.github.io/repo">
        添加到Sileo
      </a>

      <p class="footer">GitHub Pages托管</p>
    </div>
  </main>

</body>
</html>
